services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myplatform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "9000:8080"
    environment:
      - GIN_MODE=release
      - MYPLATFORM_AUTH_JWT_SECRET=${MYPLATFORM_AUTH_JWT_SECRET:-change-me-in-production}
      - MYPLATFORM_AUTH_OAUTH_GITHUB_CLIENT_ID=${MYPLATFORM_AUTH_OAUTH_GITHUB_CLIENT_ID:-}
      - MYPLATFORM_AUTH_OAUTH_GITHUB_CLIENT_SECRET=${MYPLATFORM_AUTH_OAUTH_GITHUB_CLIENT_SECRET:-}
      - MYPLATFORM_AUTH_OAUTH_GITHUB_REDIRECT_URL=${MYPLATFORM_AUTH_OAUTH_GITHUB_REDIRECT_URL:-}
      - MYPLATFORM_AUTH_OAUTH_DISCORD_CLIENT_ID=${MYPLATFORM_AUTH_OAUTH_DISCORD_CLIENT_ID:-}
      - MYPLATFORM_AUTH_OAUTH_DISCORD_CLIENT_SECRET=${MYPLATFORM_AUTH_OAUTH_DISCORD_CLIENT_SECRET:-}
      - MYPLATFORM_AUTH_OAUTH_DISCORD_REDIRECT_URL=${MYPLATFORM_AUTH_OAUTH_DISCORD_REDIRECT_URL:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
